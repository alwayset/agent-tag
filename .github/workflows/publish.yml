name: Publish to PyPI

# Publish on a GitHub Release. Draft/edit the release first, then "Publish
# release" to trigger this workflow.
on:
  release:
    types: [published]

# Least privilege: build needs to read the repo; publish needs an OIDC token
# for PyPI trusted publishing (no stored API token).
permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment is where the trusted publisher is configured on
    # PyPI (project: agent-tag). Required for OIDC to be accepted.
    environment: pypi
    permissions:
      id-token: write # mint the OIDC token PyPI exchanges for an upload token
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
