name: Feature request
description: Suggest an idea or enhancement for Agent Tag
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question or want to discuss an idea before proposing it? Start a
        [Discussion](https://github.com/alwayset/agent-tag/discussions) instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as concrete as you can.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Agent Tag does this touch?
      options:
        - Adapter (chat platform)
        - Backend (LLM / agent harness)
        - Corpus ingestion / knowledge base
        - Governance (allowlist, budgets, audit, redaction)
        - Memory
        - Admin web console
        - Ambient / proactive nudges
        - Docs
        - Other
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
    validations:
      required: false
