name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please don't report security vulnerabilities here —
        see [SECURITY.md](https://github.com/alwayset/agent-tag/blob/main/SECURITY.md)
        for private reporting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
      placeholder: When I ... the bot ... but I expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `agent-tag serve`
        2. ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: deploy-mode
    attributes:
      label: How are you running Agent Tag?
      options:
        - pip (agent-tag serve)
        - Docker / docker compose
        - Zero-credential demo (agent-tag run --adapter console --backend echo)
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: adapter
    attributes:
      label: Adapter
      description: Which chat adapter (console, larkcli, lark, slack, discord)?
      placeholder: larkcli
    validations:
      required: false
  - type: input
    id: backend
    attributes:
      label: Backend
      description: Which agent backend (echo, claude, openai, cli)?
      placeholder: claude
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Agent Tag version or git commit, and your Python version.
      placeholder: 0.1.0 / Python 3.11.8
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Relevant console output. Redact any secrets (API keys, tokens, app secret).
      render: shell
    validations:
      required: false
