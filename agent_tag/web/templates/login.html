<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Agent Tag</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="card login-card">
    <div class="brand-mark">#</div>
    <h1 style="text-align:center;font-size:19px;margin:0 0 4px;">Agent Tag</h1>
    <p style="text-align:center;color:var(--text-soft);margin:0 0 20px;">Admin console</p>
    <form method="post" action="/login" class="form">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="field">
        <label for="token">Admin token</label>
        <input type="password" id="token" name="token" placeholder="Paste your admin token" autofocus>
        {% if error %}<div class="login-err">{{ error }}</div>{% endif %}
      </div>
      <button class="btn" type="submit" style="width:100%;justify-content:center;">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
